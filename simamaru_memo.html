<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="しままる">
<title>しままるのおしごとメモ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Hiragino Maru Gothic Pro','BIZ UDPGothic',sans-serif;
  background:linear-gradient(135deg,#fde8f2 0%,#fff0f8 50%,#e8f6ee 100%);
  min-height:100vh;padding:20px 16px 40px;color:#2c3e50
}
@keyframes pulseAlert{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.78;transform:scale(1.03)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:translateY(0);opacity:1}}
.container{max-width:860px;margin:0 auto}
.header{text-align:center;margin-bottom:18px}
.header-image{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:50%;
  margin-bottom:6px;
  box-shadow:0 4px 12px rgba(0,0,0,.15)
}
.header-bird{font-size:48px;margin-bottom:4px}
.header-title{font-size:22px;font-weight:900;color:#8a2c5a;letter-spacing:1px}
.header-sub{font-size:13px;color:#d4789a;margin-top:4px}

.alert{
  background:linear-gradient(135deg,#fff3cd,#ffe08a);
  border:2px solid #f4a900;border-radius:16px;padding:14px 16px;margin-bottom:16px;
  display:flex;align-items:flex-start;gap:12px;box-shadow:0 4px 12px rgba(244,169,0,.15);
  animation:fadeIn .25s ease
}
.alert-bird{font-size:26px}
.alert-title{font-weight:800;color:#b8860b;font-size:13px}
.alert-item{font-size:12px;color:#856404;margin-top:3px}

.view-toggle,.filter-row,.top-tools,.progress-toolbar,.timeline-toolbar{
  display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap
}
.view-toggle{
  background:#fff;border-radius:14px;padding:5px;box-shadow:0 2px 10px rgba(220,100,160,.10)
}
.view-btn,.filter-btn,.ghost-btn,.small-btn,.seg-btn{
  border:none;border-radius:12px;cursor:pointer;font-family:inherit;transition:all .18s
}
.view-btn{
  flex:1;padding:10px 0;font-weight:700;font-size:14px;color:#d4789a;background:transparent
}
.view-btn.active{background:#e8629a;color:#fff}
.filter-btn,.seg-btn{
  padding:7px 14px;border-radius:20px;font-weight:700;font-size:13px;background:#fde8f2;color:#e8629a
}
.filter-btn.active,.seg-btn.active{background:#e8629a;color:#fff}
.task-count{font-size:13px;color:#d4789a;margin-left:auto}

.panel,.task-row,.calendar-wrap,.progress-wrap,.tool-wrap,.add-form,.subtask-box,.timeline-card{
  background:#fff;border-radius:18px;box-shadow:0 4px 20px rgba(220,100,160,.10)
}

.progress-wrap{padding:14px 16px;margin-bottom:14px}
.progress-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-title{font-size:14px;font-weight:800;color:#8a2c5a}
.progress-num{font-size:12px;color:#d4789a}
.progress{height:12px;background:#f5e8ee;border-radius:20px;overflow:hidden}
.progress-bar{
  height:100%;width:0%;
  background:linear-gradient(135deg,#e8629a,#f4a0c4);border-radius:20px;transition:width .25s ease
}
.progress-sub{font-size:12px;color:#a6788b;margin-top:8px}

.task-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.task-empty{text-align:center;padding:40px 20px;color:#b0c4de;font-size:14px}
.task-row{
  padding:14px 16px;display:flex;align-items:flex-start;gap:12px;animation:fadeIn .22s ease;
  scroll-margin-top:16px
}
.task-row.done{opacity:.72;background:#f8f9fa}
.task-main{flex:1;min-width:0}
.task-name{font-weight:700;font-size:15px;color:#2c3e50;word-break:break-word}
.task-name.done{text-decoration:line-through}
.task-note{font-size:12px;color:#94a0ac;margin-top:4px;white-space:pre-wrap;word-break:break-word}
.task-meta{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap;align-items:center}
.task-check{width:22px;height:22px;cursor:pointer;accent-color:#e8629a;flex-shrink:0;margin-top:2px}
.task-del,.task-edit,.task-open-sub{
  border:none;border-radius:10px;padding:7px 10px;cursor:pointer;font-size:14px;flex-shrink:0
}
.task-edit{background:#eef6ff;color:#5b8bd9}
.task-del{background:#fff0f0;color:#ff7b7b}
.task-open-sub{background:#f5efff;color:#7d5bd9}
.priority-badge,.deadline-badge,.mini-badge{
  border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700
}
.deadline-badge{color:#fff}
.deadline-badge.pulse{animation:pulseAlert 1.2s infinite}
.deadline-text{font-size:12px;color:#aaa}
.progress-pill{
  font-size:12px;font-weight:800;background:#fff0f8;color:#c04d7d;padding:3px 10px;border-radius:20px
}

.subtask-box{margin-top:12px;padding:12px}
.subtask-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.subtask-title{font-size:13px;font-weight:800;color:#8a2c5a}
.subtask-list{display:flex;flex-direction:column;gap:8px}
.subtask-row{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:12px;background:#fafbff
}
.subtask-name{font-size:13px;flex:1}
.subtask-name.done{text-decoration:line-through;opacity:.6}
.subtask-check{width:18px;height:18px;accent-color:#e8629a}
.subtask-del{
  border:none;border-radius:8px;background:#fff0f0;color:#ff7b7b;padding:5px 8px;cursor:pointer
}
.subtask-add-row{display:flex;gap:8px;margin-top:10px}
.subtask-input{
  flex:1;padding:10px 12px;border-radius:10px;border:2px solid #f4c0dc;font-size:13px;font-family:inherit;outline:none
}
.subtask-input:focus{border-color:#e8629a}

.add-form{padding:20px;margin-bottom:14px;animation:fadeIn .2s ease}
.add-form-title{font-weight:800;color:#8a2c5a;margin-bottom:14px;font-size:15px}
.form-input,.form-select,.form-textarea{
  width:100%;padding:11px 14px;border-radius:12px;border:2px solid #f4c0dc;
  font-size:14px;margin-bottom:10px;font-family:inherit;outline:none;background:#fff
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#e8629a}
.form-textarea{min-height:88px;resize:vertical}
.form-row{display:flex;gap:10px;margin-bottom:10px}
.form-group{flex:1;min-width:0}
.form-label{font-size:12px;color:#d4789a;font-weight:700;margin-bottom:4px;display:block}
.form-row-btn{display:flex;gap:8px}
.btn-add,.btn-cancel,.btn-open-add,.ghost-btn,.small-btn{
  font-family:inherit;font-weight:700
}
.btn-add{
  flex:1;padding:12px 0;background:linear-gradient(135deg,#e8629a,#f4a0c4);color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer
}
.btn-cancel{
  padding:12px 16px;background:#f0f4f8;color:#d4789a;border:none;border-radius:12px;font-size:14px;cursor:pointer
}
.btn-open-add{
  width:100%;padding:14px 0;background:linear-gradient(135deg,#e8629a,#f4a0c4);color:#fff;border:none;border-radius:16px;
  font-size:16px;cursor:pointer;box-shadow:0 4px 16px rgba(213,91,155,.3)
}
.ghost-btn{
  padding:10px 12px;background:#fff;border:2px solid #f3d5e3;color:#c15d87
}
.small-btn{
  padding:8px 10px;background:#f8eff4;color:#c15d87
}

.calendar-wrap{padding:16px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-nav{
  background:#fde8f2;border:none;border-radius:10px;padding:8px 16px;cursor:pointer;font-weight:700;color:#e8629a;font-size:18px
}
.cal-title{font-weight:800;font-size:16px;color:#8a2c5a}
.cal-hint{
  font-size:12px;color:#d4789a;text-align:center;margin-bottom:10px;background:#fff0f8;border-radius:10px;padding:6px 0
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-weekday{text-align:center;font-size:12px;font-weight:700;padding:4px 0}
.cal-day{
  border-radius:10px;padding:5px 3px;text-align:center;min-height:62px;cursor:pointer;transition:all .15s;
  background:#fafcff;border:2px solid transparent;position:relative
}
.cal-day:active{transform:scale(.97)}
.cal-day.has-task{background:#fde8f2}
.cal-day.is-today{background:#e8629a}
.cal-day.urgent{border-color:#f4a900}
.cal-day-num{font-size:13px;font-weight:500;color:#333}
.cal-day.is-today .cal-day-num{color:#fff;font-weight:800}
.cal-task-chip{
  font-size:9px;color:#fff;border-radius:4px;padding:1px 3px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.cal-more{font-size:9px;color:#888}
.cal-plus{position:absolute;bottom:2px;right:4px;font-size:11px;color:#f4c0dc;font-weight:700}
.cal-day.is-today .cal-plus{color:rgba(255,255,255,.55)}

.tool-wrap{padding:16px;margin-top:14px}
.tool-title{font-weight:800;color:#8a2c5a;font-size:14px;margin-bottom:10px}
.install-hint{font-size:12px;color:#a56b84;line-height:1.6}

.timeline-card{padding:14px 16px;margin-bottom:14px}
.timeline-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.timeline-title{font-weight:800;color:#8a2c5a;font-size:15px}
.chart-area{display:flex;flex-direction:column;gap:10px}
.chart-row{display:grid;grid-template-columns:180px 1fr 70px;gap:10px;align-items:center}
.chart-label{font-size:12px;color:#6f7280;cursor:pointer}
.chart-bar-wrap{height:16px;background:#f5e8ee;border-radius:999px;overflow:hidden;position:relative}
.chart-bar{height:100%;background:linear-gradient(135deg,#e8629a,#f4a0c4);border-radius:999px}
.chart-val{font-size:12px;color:#8a2c5a;text-align:right;font-weight:700}

.gantt-area{display:flex;flex-direction:column;gap:10px}
.gantt-header,.gantt-row{
  display:grid;grid-template-columns:220px 1fr;gap:10px;align-items:center
}
.gantt-name{font-size:12px;color:#6f7280;cursor:pointer}
.gantt-grid{
  display:grid;gap:2px;min-height:26px;align-items:center
}
.gantt-day,.gantt-cell{
  border-radius:6px;text-align:center;font-size:10px;padding:4px 0
}
.gantt-day{background:#f8f0f5;color:#a26d86;font-weight:700}
.gantt-cell{background:#fafbff;position:relative}
.gantt-fill{
  position:absolute;top:3px;bottom:3px;border-radius:5px;
  background:linear-gradient(135deg,#f7aac9,#e8629a)
}
.gantt-progress{
  position:absolute;top:3px;bottom:3px;border-radius:5px;
  background:linear-gradient(135deg,#88e0b2,#51c878)
}
.fold-box{
  margin-top:12px;padding-top:10px;border-top:1px dashed #f0c7da
}
.fold-row{
  display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:12px;background:#fafbff;
  margin-bottom:8px;cursor:pointer
}
.fold-left{display:flex;flex-direction:column;gap:4px}
.fold-title{font-size:13px;font-weight:700;color:#5b5770}
.fold-sub{font-size:11px;color:#9a90a6}
.fold-right{font-size:12px;font-weight:800;color:#c04d7d}

.modal-overlay{
  position:fixed;inset:0;background:rgba(138,44,95,.35);display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;animation:fadeIn .15s ease
}
.modal{
  background:#fff;border-radius:24px;padding:24px;width:100%;max-width:380px;
  box-shadow:0 8px 40px rgba(138,44,95,.18);animation:fadeIn .2s ease
}
.modal-header{text-align:center;margin-bottom:16px}
.modal-bird{font-size:32px}
.modal-title{font-weight:800;color:#8a2c5a;font-size:16px;margin-top:4px}
.modal-sub{font-size:12px;color:#d4789a;margin-top:4px}
.priority-row{display:flex;gap:8px;margin-top:6px}
.priority-btn{
  flex:1;padding:8px 4px;border-radius:12px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;
  border:2px solid #e0eaf4;background:#fff;color:#aaa
}
.footer{text-align:center;margin-top:24px;font-size:12px;color:#d4789a}
.hidden{display:none !important}

@media (max-width:700px){
  .chart-row{grid-template-columns:120px 1fr 56px}
  .gantt-header,.gantt-row{grid-template-columns:120px 1fr}
}
@media (max-width:520px){
  .form-row{flex-direction:column}
}
  .header{
  position:relative;
  margin-bottom:18px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 6px 24px rgba(0,0,0,0.15);
}

.header-image{
  width:100%;
  height:220px;
  object-fit:cover;
  display:block;
}

.header-overlay{
  position:absolute;
  bottom:14px;
  left:18px;
  right:18px;
  color:white;
  text-shadow:0 2px 10px rgba(0,0,0,0.6);
}

.header-title{
  font-size:22px;
  font-weight:900;
  letter-spacing:1px;
}

.header-sub{
  font-size:13px;
  margin-top:4px;
  opacity:0.95;
}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <img src="shimamaru.jpg" class="header-image" alt="しままる">

  <div class="header-overlay">
    <div class="header-title">しままるのおしごとメモ</div>
    <div class="header-sub">ジュリリ！ひなタスクつきだよ！</div>
  </div>
</div>

  <div id="alert-area"></div>

  <div class="view-toggle">
    <button class="view-btn active" id="btn-list" onclick="setView('list')">📋 リスト</button>
    <button class="view-btn" id="btn-calendar" onclick="setView('calendar')">📅 カレンダー</button>
    <button class="view-btn" id="btn-stats" onclick="setView('stats')">📊 進捗</button>
  </div>

  <div id="list-view">
    <div class="filter-row">
      <button class="filter-btn active" id="f-all" onclick="setFilter('all')">すべて</button>
      <button class="filter-btn" id="f-active" onclick="setFilter('active')">やること</button>
      <button class="filter-btn" id="f-done" onclick="setFilter('done')">おわった</button>
      <span class="task-count" id="task-count"></span>
    </div>
    <div class="task-list" id="task-list"></div>
    <div id="add-area"></div>
  </div>

  <div id="calendar-view" class="hidden">
    <div class="calendar-wrap">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <span class="cal-title" id="cal-title"></span>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-hint">📅 日付をタップすると、その日のタスクを追加できるよ！</div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <div id="stats-view" class="hidden">
    <div class="progress-wrap">
      <div class="progress-head">
        <div class="progress-title">全体の進みぐあい</div>
        <div class="progress-num" id="progress-num">0%</div>
      </div>
      <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="progress-sub" id="progress-sub"></div>
    </div>

    <div class="timeline-card">
      <div class="timeline-head">
        <div class="timeline-title">進捗ビュー</div>
        <div class="progress-toolbar">
          <button class="seg-btn active" id="mode-deadline" onclick="setStatsMode('deadline')">締切ベース</button>
          <button class="seg-btn" id="mode-history" onclick="setStatsMode('history')">進捗履歴ベース</button>
          <button class="seg-btn active" id="unit-day" onclick="setStatsUnit('day')">日</button>
          <button class="seg-btn" id="unit-week" onclick="setStatsUnit('week')">週</button>
          <button class="seg-btn" id="unit-month" onclick="setStatsUnit('month')">月</button>
          <button class="seg-btn" id="unit-year" onclick="setStatsUnit('year')">年</button>
        </div>
      </div>

      <div class="timeline-toolbar">
        <button class="small-btn" onclick="shiftStatsRange(-1)">← 前へ</button>
        <button class="small-btn" onclick="resetStatsRange()">今日</button>
        <button class="small-btn" onclick="shiftStatsRange(1)">次へ →</button>
        <span class="task-count" id="stats-range-label"></span>
      </div>

      <div class="chart-area" id="chart-area"></div>

      <div style="height:14px"></div>

      <div class="gantt-area" id="gantt-area"></div>

      <div class="fold-box" id="fold-area"></div>
    </div>
  </div>

  <div class="tool-wrap">
    <div class="tool-title">便利ツール</div>
    <div class="top-tools">
      <button class="ghost-btn" onclick="requestNotifications()">🔔 通知許可</button>
      <button class="ghost-btn" onclick="exportData()">💾 バックアップ</button>
      <button class="ghost-btn" onclick="document.getElementById('import-file').click()">📥 復元</button>
      <button class="ghost-btn" onclick="resetData()">🧹 全削除</button>
    </div>
    <input type="file" id="import-file" accept=".json,application/json" class="hidden">
    <div class="install-hint">
      iPhoneで使うときは、Safariで開いて 共有 → ホーム画面に追加 でアプリ風に使えるよ。
      データはこの端末のブラウザ内に保存されるよ。
    </div>
  </div>

  <div class="footer">🐦 しままる、いっしょにがんばろうよ！ジュリリ！</div>
</div>

<div class="modal-overlay hidden" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-bird">🐦</div>
      <div class="modal-title" id="modal-date-title"></div>
      <div class="modal-sub">ジュリリ！何をいれる？</div>
    </div>
    <input class="form-input" id="modal-name" placeholder="タスク名をいれてね" onkeydown="if(event.key==='Enter')modalAdd()">
    <textarea class="form-textarea" id="modal-note" placeholder="メモも書けるよ"></textarea>
    <div style="margin-bottom:14px;">
      <div class="form-label">優先度はどのくらい？</div>
      <div class="priority-row">
        <button class="priority-btn" id="p-high" onclick="setModalPriority('high')">🔴 高い</button>
        <button class="priority-btn" id="p-medium" onclick="setModalPriority('medium')">🟡 ふつう</button>
        <button class="priority-btn" id="p-low" onclick="setModalPriority('low')">🟢 低い</button>
      </div>
    </div>
    <div class="form-row-btn">
      <button class="btn-add" onclick="modalAdd()">追加するよ！🐦</button>
      <button class="btn-cancel" onclick="closeModal()">やめる</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'shimamaru-tasks-complete-v2';
const PRIORITIES = {
  high:   { label: '🔴 高い', color: '#ff6b6b', bg: '#fff0f0', order: 0 },
  medium: { label: '🟡 ふつう', color: '#f4a900', bg: '#fffbea', order: 1 },
  low:    { label: '🟢 低い', color: '#51c878', bg: '#f0fff4', order: 2 }
};
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const WEEKDAYS = ['日','月','火','水','木','金','土'];

let tasks = loadTasks();
let view = 'list';
let filter = 'all';
let calDate = new Date();
let modalDate = '';
let modalPriority = 'medium';
let addingForm = false;
let editingId = null;
let openSubtaskTaskId = null;

let statsMode = 'deadline';
let statsUnit = 'day';
let statsAnchorDate = todayStart();

function todayStart(){
  const t = new Date();
  t.setHours(0,0,0,0);
  return t;
}

function loadTasks(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){
    return [];
  }
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}
function ensureTaskShape(t){
  const created = t.createdAt || Date.now();
  return {
    id: t.id || Date.now() + Math.floor(Math.random()*10000),
    name: t.name || '無題タスク',
    note: t.note || '',
    startDate: t.startDate || dateToYMD(new Date(created)),
    deadline: t.deadline || '',
    priority: ['high','medium','low'].includes(t.priority) ? t.priority : 'medium',
    done: !!t.done,
    subtasks: Array.isArray(t.subtasks) ? t.subtasks.map(st => ({
      id: st.id || Date.now() + Math.floor(Math.random()*10000),
      name: st.name || 'ひなタスク',
      done: !!st.done,
      createdAt: st.createdAt || Date.now()
    })) : [],
    history: Array.isArray(t.history) ? t.history : [],
    createdAt: created,
    updatedAt: t.updatedAt || created
  };
}
tasks = tasks.map(ensureTaskShape);

function dateToYMD(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseYMD(s){
  return new Date(s + 'T00:00:00');
}
function addDays(date, n){
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}
function startOfWeek(date){
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() - day);
  d.setHours(0,0,0,0);
  return d;
}
function endOfWeek(date){
  return addDays(startOfWeek(date), 6);
}
function startOfMonth(date){
  return new Date(date.getFullYear(), date.getMonth(), 1);
}
function endOfMonth(date){
  return new Date(date.getFullYear(), date.getMonth()+1, 0);
}
function startOfYear(date){
  return new Date(date.getFullYear(), 0, 1);
}
function endOfYear(date){
  return new Date(date.getFullYear(), 11, 31);
}
function getDaysLeft(deadline){
  if(!deadline) return null;
  const today = todayStart();
  const d = parseYMD(deadline);
  return Math.ceil((d - today) / 86400000);
}
function deadlineBadge(deadline){
  if (!deadline) return '';
  const days = getDaysLeft(deadline);
  let color = '#b0c4de', label = `あと ${days} 日`, pulse = false;
  if (days < 0) { color = '#999'; label = '期限切れ'; }
  else if (days === 0) { color = '#ff4444'; label = '今日まで！'; pulse = true; }
  else if (days === 1) { color = '#ff6b6b'; label = '明日まで！'; pulse = true; }
  else if (days <= 3) { color = '#f4a900'; label = `あと ${days} 日`; pulse = true; }
  return `<span class="deadline-badge ${pulse?'pulse':''}" style="background:${color}">${label}</span>`;
}
function escapeHtml(str){
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}
function escapeAttr(str){ return escapeHtml(str); }

function taskProgress(task){
  const subs = Array.isArray(task.subtasks) ? task.subtasks : [];
  if(subs.length === 0) return task.done ? 100 : 0;
  const doneCount = subs.filter(s => s.done).length;
  return Math.round(doneCount / subs.length * 100);
}
function isTaskDoneByProgress(task){
  return taskProgress(task) === 100;
}
function recordHistory(task, reason='update'){
  const p = taskProgress(task);
  const today = dateToYMD(todayStart());
  if(!Array.isArray(task.history)) task.history = [];
  const last = task.history[task.history.length - 1];
  if(last && last.date === today && last.progress === p){
    return;
  }
  task.history.push({ date: today, progress: p, reason });
}

function renderAlert(){
  const urgent = tasks
    .filter(t => !t.done && t.deadline && getDaysLeft(t.deadline) >= 0 && getDaysLeft(t.deadline) <= 3)
    .sort((a,b) => getDaysLeft(a.deadline) - getDaysLeft(b.deadline));

  const el = document.getElementById('alert-area');
  if (!urgent.length) { el.innerHTML = ''; return; }

  el.innerHTML = `<div class="alert">
    <div class="alert-bird">🐦</div>
    <div>
      <div class="alert-title">ジュリリ！締め切りが近いよ〜！</div>
      ${urgent.slice(0,5).map(t => `<div class="alert-item">・${escapeHtml(t.name)}（${getDaysLeft(t.deadline)===0?'今日！':'あと'+getDaysLeft(t.deadline)+'日'}）</div>`).join('')}
    </div>
  </div>`;
}

function sortTasks(arr){
  return [...arr].sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const pa = PRIORITIES[a.priority || 'medium'].order;
    const pb = PRIORITIES[b.priority || 'medium'].order;
    if (pa !== pb) return pa - pb;
    if (!a.deadline && !b.deadline) return (b.createdAt||0) - (a.createdAt||0);
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return parseYMD(a.deadline) - parseYMD(b.deadline);
  });
}

function renderCalendar(){
  const year = calDate.getFullYear(), month = calDate.getMonth();
  document.getElementById('cal-title').textContent = `${year}年 ${MONTHS[month]}`;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  const tasksByDate = {};
  tasks.filter(t => !t.done && t.deadline).forEach(t => {
    if (!tasksByDate[t.deadline]) tasksByDate[t.deadline] = [];
    tasksByDate[t.deadline].push(t);
  });

  let html = WEEKDAYS.map((w, i) =>
    `<div class="cal-weekday" style="color:${i===0?'#ff7b7b':i===6?'#e8629a':'#888'}">${w}</div>`
  ).join('');

  for (let i = 0; i < firstDay; i++) html += '<div></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayTasks = sortTasks(tasksByDate[key] || []);
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    const hasUrgent = dayTasks.some(t => getDaysLeft(t.deadline) <= 3);
    const classes = ['cal-day', isToday?'is-today':'', dayTasks.length?'has-task':'', hasUrgent?'urgent':''].filter(Boolean).join(' ');
    const chips = dayTasks.slice(0,2).map(t =>
      `<div class="cal-task-chip" style="background:${PRIORITIES[t.priority||'medium'].color}">${escapeHtml(t.name)}</div>`
    ).join('');
    const more = dayTasks.length > 2 ? `<div class="cal-more">+${dayTasks.length-2}</div>` : '';
    html += `<div class="${classes}" onclick="openModal('${key}')">
      <div class="cal-day-num">${d}</div>
      ${chips}${more}
      <div class="cal-plus">＋</div>
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function renderStats(){
  const total = tasks.length;
  const avg = total ? Math.round(tasks.reduce((s,t)=>s+taskProgress(t),0)/total) : 0;
  const done = tasks.filter(t => t.done).length;
  const active = tasks.filter(t => !t.done).length;

  document.getElementById('progress-bar').style.width = avg + '%';
  document.getElementById('progress-num').textContent = avg + '%';
  document.getElementById('progress-sub').textContent = total
    ? `全部で ${total} 件。完了 ${done} 件、未完了 ${active} 件。平均進捗は ${avg}% だよ。`
    : 'まだタスクがないよ。まずは1件入れてみよう！';

  document.getElementById('mode-deadline').className = 'seg-btn' + (statsMode==='deadline' ? ' active' : '');
  document.getElementById('mode-history').className = 'seg-btn' + (statsMode==='history' ? ' active' : '');
  ['day','week','month','year'].forEach(u => {
    document.getElementById('unit-'+u).className = 'seg-btn' + (statsUnit===u ? ' active' : '');
  });

  document.getElementById('stats-range-label').textContent = rangeLabel(getCurrentRange());
  renderChartArea();
  renderGanttArea();
  renderFoldArea();
}

function setStatsMode(mode){
  statsMode = mode;
  renderStats();
}
function setStatsUnit(unit){
  statsUnit = unit;
  renderStats();
}
function resetStatsRange(){
  statsAnchorDate = todayStart();
  renderStats();
}
function shiftStatsRange(dir){
  if(statsUnit === 'day') statsAnchorDate = addDays(statsAnchorDate, dir);
  if(statsUnit === 'week') statsAnchorDate = addDays(statsAnchorDate, 7 * dir);
  if(statsUnit === 'month') statsAnchorDate = new Date(statsAnchorDate.getFullYear(), statsAnchorDate.getMonth()+dir, 1);
  if(statsUnit === 'year') statsAnchorDate = new Date(statsAnchorDate.getFullYear()+dir, 0, 1);
  renderStats();
}
function goToNextUnit(anchorYMD){
  const d = parseYMD(anchorYMD);
  statsAnchorDate = d;
  if(statsUnit === 'year') statsUnit = 'month';
  else if(statsUnit === 'month') statsUnit = 'week';
  else if(statsUnit === 'week') statsUnit = 'day';
  renderStats();
}
function goToTask(taskId){
  setView('list');
  setFilter('all');
  setTimeout(() => {
    const el = document.getElementById('task-'+taskId);
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      el.style.outline = '3px solid #f4a0c4';
      setTimeout(()=>{ el.style.outline=''; }, 1600);
    }
  }, 50);
}

function getCurrentRange(){
  const a = new Date(statsAnchorDate);
  if(statsUnit === 'day'){
    const s = todayStart();
    s.setTime(a.getTime());
    return {start:s, end:s};
  }
  if(statsUnit === 'week'){
    return {start:startOfWeek(a), end:endOfWeek(a)};
  }
  if(statsUnit === 'month'){
    return {start:startOfMonth(a), end:endOfMonth(a)};
  }
  return {start:startOfYear(a), end:endOfYear(a)};
}
function rangeLabel(range){
  if(statsUnit === 'day') return dateToYMD(range.start);
  if(statsUnit === 'week') return `${dateToYMD(range.start)} 〜 ${dateToYMD(range.end)}`;
  if(statsUnit === 'month') return `${range.start.getFullYear()}年 ${range.start.getMonth()+1}月`;
  return `${range.start.getFullYear()}年`;
}
function childUnitLabel(date){
  const d = parseYMD(date);
  if(statsUnit === 'year') return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  if(statsUnit === 'month') {
    const s = startOfWeek(d);
    const e = endOfWeek(d);
    return `${dateToYMD(s)} 〜 ${dateToYMD(e)}`;
  }
  if(statsUnit === 'week') return dateToYMD(d);
  return dateToYMD(d);
}

function enumerateChildBuckets(range){
  const arr = [];
  if(statsUnit === 'year'){
    for(let m=0;m<12;m++){
      const d = new Date(range.start.getFullYear(), m, 1);
      arr.push({
        key: dateToYMD(d),
        title: `${d.getFullYear()}年 ${d.getMonth()+1}月`,
        start: startOfMonth(d),
        end: endOfMonth(d)
      });
    }
    return arr;
  }
  if(statsUnit === 'month'){
    let cur = startOfWeek(range.start);
    while(cur <= range.end){
      const s = startOfWeek(cur);
      const e = endOfWeek(cur);
      arr.push({
        key: dateToYMD(s),
        title: `${dateToYMD(s)} 〜 ${dateToYMD(e)}`,
        start: s,
        end: e
      });
      cur = addDays(cur, 7);
    }
    return arr;
  }
  if(statsUnit === 'week'){
    let cur = new Date(range.start);
    while(cur <= range.end){
      arr.push({
        key: dateToYMD(cur),
        title: dateToYMD(cur),
        start: new Date(cur),
        end: new Date(cur)
      });
      cur = addDays(cur, 1);
    }
    return arr;
  }
  return [];
}

function progressInRange(task, range){
  if(statsMode === 'deadline'){
    if(!task.deadline) return null;
    const dd = parseYMD(task.deadline);
    if(dd < range.start || dd > range.end) return null;
    return taskProgress(task);
  }
  const points = (task.history || []).filter(h => {
    const d = parseYMD(h.date);
    return d >= range.start && d <= range.end;
  });
  if(points.length === 0){
    const prior = (task.history || []).filter(h => parseYMD(h.date) < range.start);
    if(prior.length === 0) return null;
    return prior[prior.length-1].progress;
  }
  return points[points.length-1].progress;
}

function renderChartArea(){
  const area = document.getElementById('chart-area');
  const range = getCurrentRange();
  const buckets = enumerateChildBuckets(range);

  if(statsUnit === 'day'){
    const list = sortTasks(tasks).map(t => ({
      task:t,
      value: progressInRange(t, range)
    })).filter(x => x.value !== null);

    if(!list.length){
      area.innerHTML = '<div class="task-note">この期間に表示できるデータがないよ。</div>';
      return;
    }
    area.innerHTML = list.map(x => `
      <div class="chart-row">
        <div class="chart-label" onclick="goToTask(${x.task.id})">${escapeHtml(x.task.name)}</div>
        <div class="chart-bar-wrap"><div class="chart-bar" style="width:${x.value}%"></div></div>
        <div class="chart-val">${x.value}%</div>
      </div>
    `).join('');
    return;
  }

  const rows = buckets.map(b => {
    const related = tasks.map(t => ({task:t, value:progressInRange(t, {start:b.start, end:b.end})})).filter(x => x.value !== null);
    const avg = related.length ? Math.round(related.reduce((s,x)=>s+x.value,0)/related.length) : 0;
    return { bucket:b, avg, count:related.length };
  });

  area.innerHTML = rows.map(r => `
    <div class="chart-row">
      <div class="chart-label" onclick="goToNextUnit('${dateToYMD(r.bucket.start)}')">${escapeHtml(r.bucket.title)}</div>
      <div class="chart-bar-wrap"><div class="chart-bar" style="width:${r.avg}%"></div></div>
      <div class="chart-val">${r.avg}%</div>
    </div>
  `).join('');
}

function renderGanttArea(){
  const area = document.getElementById('gantt-area');
  const range = getCurrentRange();

  const headerDays = [];
  let cur = new Date(range.start);
  while(cur <= range.end){
    headerDays.push(new Date(cur));
    cur = addDays(cur, 1);
  }

  const tasksInRange = sortTasks(tasks).filter(t => {
    const s = parseYMD(t.startDate || dateToYMD(new Date(t.createdAt)));
    const e = t.deadline ? parseYMD(t.deadline) : s;
    return !(e < range.start || s > range.end);
  });

  if(!tasksInRange.length){
    area.innerHTML = '<div class="task-note">この期間にガント表示できるタスクがないよ。</div>';
    return;
  }

  const header = `
    <div class="gantt-header">
      <div class="gantt-name">タスク</div>
      <div class="gantt-grid" style="grid-template-columns:repeat(${headerDays.length},1fr)">
        ${headerDays.map(d => `<div class="gantt-day">${d.getDate()}</div>`).join('')}
      </div>
    </div>
  `;

  const rows = tasksInRange.slice(0, 30).map(t => {
    const s = parseYMD(t.startDate || dateToYMD(new Date(t.createdAt)));
    const e = t.deadline ? parseYMD(t.deadline) : s;
    const clippedStart = s < range.start ? range.start : s;
    const clippedEnd = e > range.end ? range.end : e;
    const totalCols = headerDays.length;
    const startIndex = Math.max(0, Math.floor((clippedStart - range.start)/86400000));
    const endIndex = Math.max(0, Math.floor((clippedEnd - range.start)/86400000));
    const span = Math.max(1, endIndex - startIndex + 1);
    const leftPct = startIndex / totalCols * 100;
    const widthPct = span / totalCols * 100;
    const prog = taskProgress(t);
    const progWidthPct = widthPct * prog / 100;

    return `
      <div class="gantt-row">
        <div class="gantt-name" onclick="goToTask(${t.id})">${escapeHtml(t.name)}<br><span class="deadline-text">${escapeHtml(t.startDate)} → ${escapeHtml(t.deadline || t.startDate)}</span></div>
        <div class="gantt-grid" style="grid-template-columns:repeat(${headerDays.length},1fr)">
          ${headerDays.map(()=>`<div class="gantt-cell"></div>`).join('')}
          <div class="gantt-fill" style="left:${leftPct}%;width:${widthPct}%"></div>
          <div class="gantt-progress" style="left:${leftPct}%;width:${progWidthPct}%"></div>
        </div>
      </div>
    `;
  }).join('');

  area.innerHTML = header + rows;
}

function renderFoldArea(){
  const area = document.getElementById('fold-area');
  const range = getCurrentRange();

  if(statsUnit === 'day'){
    area.innerHTML = '';
    return;
  }

  const buckets = enumerateChildBuckets(range);
  const rows = buckets.map(b => {
    const related = tasks.filter(t => {
      if(statsMode === 'deadline'){
        if(!t.deadline) return false;
        const dd = parseYMD(t.deadline);
        return dd >= b.start && dd <= b.end;
      }
      const hasHist = (t.history || []).some(h => {
        const d = parseYMD(h.date);
        return d >= b.start && d <= b.end;
      });
      return hasHist;
    });

    const avg = related.length ? Math.round(related.reduce((s,t)=>s+taskProgress(t),0)/related.length) : 0;
    return `
      <div class="fold-row" onclick="goToNextUnit('${dateToYMD(b.start)}')">
        <div class="fold-left">
          <div class="fold-title">${escapeHtml(b.title)}</div>
          <div class="fold-sub">${related.length}件のタスク</div>
        </div>
        <div class="fold-right">${avg}% ▸</div>
      </div>
    `;
  }).join('');

  area.innerHTML = `<div class="tool-title">細かい単位を見る</div>${rows || '<div class="task-note">表示できるデータがないよ。</div>'}`;
}

function render(){
  renderAlert();
  renderList();
  renderCalendar();
  renderStats();
}

  document.getElementById('list-view').classList.toggle('hidden', v!=='list');

  document.getElementById('btn-calendar').className = 'view-btn' + (v==='calendar' ? ' active' : '');
  document.getElementById('btn-stats').className = 'view-btn' + (v==='stats' ? ' active' : '');
  render();
}

function setFilter(f){
  filter = f;
  ['all','active','done'].forEach(x => {
    document.getElementById('f-'+x).className = 'filter-btn' + (f===x ? ' active' : '');
  });
  render();
}

function toggleDone(id){
  tasks = tasks.map(t => {
    if(t.id !== id) return t;
    const nextDone = !t.done;
    const updated = {
      ...t,
      done: nextDone,
      updatedAt: Date.now()
    };
    if(updated.subtasks.length === 0){
      recordHistory(updated, 'toggleDone');
    }
    return updated;
  });
  save();
  render();
}

function deleteTask(id){
  tasks = tasks.filter(t => t.id !== id);
  if(openSubtaskTaskId === id) openSubtaskTaskId = null;
  save();
  render();
}

function openForm(){
  addingForm = true;
  editingId = null;
  render();
}

function openEditForm(id){
  addingForm = true;
  editingId = id;
  render();
}

function closeForm(){
  addingForm = false;
  editingId = null;
  render();
}

function submitForm(){
  const name = document.getElementById('form-name').value.trim();
  const note = document.getElementById('form-note').value.trim();
  const startDate = document.getElementById('form-startDate').value || dateToYMD(todayStart());
  const deadline = document.getElementById('form-deadline').value;
  const priority = document.getElementById('form-priority').value;

  if (!name) return;

  if(editingId){
    tasks = tasks.map(t => {
      if(t.id !== editingId) return t;
      const updated = {
        ...t,
        name, note, startDate, deadline, priority,
        updatedAt: Date.now()
      };
      recordHistory(updated, 'edit');
      return updated;
    });
  }else{
    const now = Date.now();
    const task = ensureTaskShape({
      id: now,
      name, note, startDate, deadline, priority,
      done: false,
      subtasks: [],
      history: [],
      createdAt: now,
      updatedAt: now
    });
    recordHistory(task, 'create');
    tasks.push(task);
  }

  addingForm = false;
  editingId = null;
  save();
  render();
  maybeNotifySoon();
}

function toggleSubtaskPanel(taskId){
  openSubtaskTaskId = (openSubtaskTaskId === taskId) ? null : taskId;
  render();
}

function addSubtask(taskId){
  const input = document.getElementById('subtask-input-'+taskId);
  if(!input) return;
  const name = input.value.trim();
  if(!name) return;

  tasks = tasks.map(t => {
    if(t.id !== taskId) return t;
    const updated = {
      ...t,
      subtasks: [...t.subtasks, {
        id: Date.now(),
        name,
        done: false,
        createdAt: Date.now()
      }],
      updatedAt: Date.now()
    };
    updated.done = isTaskDoneByProgress(updated);
    recordHistory(updated, 'addSubtask');
    return updated;
  });

  save();
  render();
}

function toggleSubtaskDone(taskId, subtaskId){
  tasks = tasks.map(t => {
    if(t.id !== taskId) return t;
    const updated = {
      ...t,
      subtasks: t.subtasks.map(st => st.id === subtaskId ? {...st, done: !st.done} : st),
      updatedAt: Date.now()
    };
    updated.done = isTaskDoneByProgress(updated);
    recordHistory(updated, 'toggleSubtask');
    return updated;
  });
  save();
  render();
}

function deleteSubtask(taskId, subtaskId){
  tasks = tasks.map(t => {
    if(t.id !== taskId) return t;
    const updated = {
      ...t,
      subtasks: t.subtasks.filter(st => st.id !== subtaskId),
      updatedAt: Date.now()
    };
    updated.done = updated.subtasks.length === 0 ? updated.done : isTaskDoneByProgress(updated);
    recordHistory(updated, 'deleteSubtask');
    return updated;
  });
  save();
  render();
}

function changeMonth(dir){
  calDate = new Date(calDate.getFullYear(), calDate.getMonth() + dir, 1);
  renderCalendar();
}

function openModal(date){
  modalDate = date;
  modalPriority = 'medium';
  document.getElementById('modal-date-title').textContent = date.replace(/-/g,'/') + ' の予定だよ！';
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-note').value = '';
  updateModalPriorityBtns();
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('modal-name').focus(), 80);
}
function closeModal(){
  document.getElementById('modal').classList.add('hidden');
}
function closeModalOutside(e){
  if (e.target.id==='modal') closeModal();
}
function setModalPriority(p){
  modalPriority = p;
  updateModalPriorityBtns();
}
function updateModalPriorityBtns(){
  ['high','medium','low'].forEach(p => {
    const btn = document.getElementById('p-'+p);
    const val = PRIORITIES[p];
    if (p === modalPriority) {
      btn.style.border = `2px solid ${val.color}`;
      btn.style.background = val.bg;
      btn.style.color = val.color;
    } else {
      btn.style.border = '2px solid #e0eaf4';
      btn.style.background = '#fff';
      btn.style.color = '#aaa';
    }
  });
}
function modalAdd(){
  const name = document.getElementById('modal-name').value.trim();
  const note = document.getElementById('modal-note').value.trim();
  if (!name) return;

  const now = Date.now();
  const task = ensureTaskShape({
    id: now,
    name,
    note,
    startDate: dateToYMD(todayStart()),
    deadline: modalDate,
    priority: modalPriority,
    done: false,
    subtasks: [],
    history: [],
    createdAt: now,
    updatedAt: now
    });
  recordHistory(task, 'create');
  tasks.push(task);

  save();
  closeModal();
  render();
  maybeNotifySoon();
}

function requestNotifications(){
  if(!('Notification' in window)){
    alert('このブラウザでは通知に対応していないみたい。');
    return;
  }
  Notification.requestPermission().then(result => {
    if(result === 'granted'){
      alert('通知を許可したよ！');
      maybeNotifySoon();
    }else{
      alert('通知はまだ許可されていないよ。');
    }
  });
}

function maybeNotifySoon(){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const urgent = tasks.filter(t => !t.done && t.deadline && getDaysLeft(t.deadline) >= 0 && getDaysLeft(t.deadline) <= 1);
  if(!urgent.length) return;
  const t = sortTasks(urgent)[0];
  new Notification('しままるからお知らせ', {
    body: `${t.name} が ${getDaysLeft(t.deadline)===0 ? '今日まで' : '明日まで'}だよ！`
  });
}

function exportData(){
  const payload = {
    exportedAt: new Date().toISOString(),
    app: 'shimamaru-complete-v2',
    tasks
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'shimamaru_tasks_backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const data = JSON.parse(ev.target.result);
      const imported = Array.isArray(data) ? data : data.tasks;
      if(!Array.isArray(imported)) throw new Error('invalid');
      tasks = imported.map(ensureTaskShape);
      save();
      render();
      alert('復元できたよ！');
    }catch(err){
      alert('読み込みに失敗したよ。JSONファイルを確認してね。');
    }finally{
      e.target.value = '';
    }
  };
  reader.readAsText(file);
});

function resetData(){
  if(!confirm('ほんとうに全部消す？ この操作は元に戻せないよ。')) return;
  tasks = [];
  save();
  render();
}

tasks.forEach(t => {
  if(!t.history || !t.history.length){
    recordHistory(t, 'init');
  }
});

render();
</script>
</body>
